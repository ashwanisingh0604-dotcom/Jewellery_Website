backend:
  name: git-gateway
  branch: main
  identity_url: https://ashvikaluxe.netlify.app
  gateway_url: https://ashvikaluxe.netlify.app/.netlify/git/github

media_folder: "Assets"
public_folder: "/Assets"

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    fields:
      - {label: "Name", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Category", name: "category", widget: "string"}